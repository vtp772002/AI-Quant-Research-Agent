name: test

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,service]"
      - name: Test
        run: python -m pytest
      - name: CLI smoke
        run: python -m quant_research_agent.main --config configs/base.yaml --json
      - name: Docker build
        run: docker build .
