data:
  source: synthetic
  universe:
    - AAPL
    - MSFT
    - NVDA
    - AMZN
    - META
    - GOOGL
    - AVGO
    - COST
    - TSLA
    - NFLX
    - AMD
    - ADBE
    - CSCO
    - QCOM
    - TXN
    - INTU
    - AMAT
    - HON
    - SBUX
    - BKNG
  start: "2020-01-01"
  end: "2024-12-31"
  seed: 42
  point_in_time_universe: false
  survivorship_bias_free: false
  corporate_actions_adjusted: false
  sectors:
    AAPL: technology
    MSFT: technology
    NVDA: semiconductors
    AMZN: consumer_discretionary
    META: communication_services
    GOOGL: communication_services
    AVGO: semiconductors
    COST: consumer_staples
    TSLA: consumer_discretionary
    NFLX: communication_services
    AMD: semiconductors
    ADBE: technology
    CSCO: technology
    QCOM: semiconductors
    TXN: semiconductors
    INTU: technology
    AMAT: semiconductors
    HON: industrials
    SBUX: consumer_discretionary
    BKNG: consumer_discretionary

experiment:
  name: momentum_low_volatility_demo
  train_fraction: 0.7
  signal:
    positive_factors:
      - momentum_20d
      - momentum_60d
    negative_factors:
      - volatility_20d
      - drawdown_20d
    rank_method: percentile
  backtest:
    holding_period: 5
    rebalance_days: 5
    quantile: 0.2
    transaction_cost_bps: 5.0
    spread_cost_bps: 2.0
    market_impact_coefficient: 0.10
    portfolio_notional: 10000000
  validation:
    walk_forward:
      window_count: 3
      min_train_fraction: 0.4
  stress_tests:
    neutralization:
      enabled: true
      group_by: sector
    liquidity:
      enabled: true
      min_dollar_volume_rank: 0.2
  shorting:
    borrow_fee_bps: 75.0
    shortable_symbols:
      - AAPL
      - MSFT
      - NVDA
      - AMZN
      - META
      - GOOGL
      - AVGO
      - COST
      - NFLX
      - AMD
      - ADBE
      - CSCO
      - QCOM
      - TXN
      - INTU
      - AMAT
      - HON
      - SBUX
  robustness:
    bootstrap_iterations: 200
    bootstrap_seed: 123
    holding_periods: [3, 5, 10]
    quantiles: [0.15, 0.2, 0.3]
    cost_multipliers: [0.5, 1.0, 2.0]
  baselines:
    - name: momentum_20d_only
      positive_factors:
        - momentum_20d
      negative_factors: []
    - name: low_volatility_only
      positive_factors: []
      negative_factors:
        - volatility_20d
    - name: reversal_5d_only
      positive_factors:
        - reversal_5d
      negative_factors: []
    - name: random_cross_section
      positive_factors: []
      negative_factors: []

report:
  output_path: reports/sample_research_report.md
  experiments_path: results/experiments.csv
