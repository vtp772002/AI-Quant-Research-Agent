data:
  source: synthetic
  universe_provider:
    kind: csv
    path: universe_membership_demo.csv
  start: "2020-01-01"
  end: "2024-12-31"
  seed: 42
  point_in_time_universe: true
  survivorship_bias_free: true
  corporate_actions_adjusted: false
  sectors:
    AAPL: technology
    MSFT: technology
    NVDA: semiconductors
    AMZN: consumer_discretionary
    META: communication_services
    GOOGL: communication_services
    AVGO: semiconductors
    COST: consumer_staples
    TSLA: consumer_discretionary
    NFLX: communication_services
    AMD: semiconductors
    ADBE: technology
    CSCO: technology
    QCOM: semiconductors
    TXN: semiconductors
    INTU: technology
    AMAT: semiconductors
    HON: industrials
    SBUX: consumer_discretionary
    BKNG: consumer_discretionary

experiment:
  name: point_in_time_synthetic_momentum_low_volatility
  train_fraction: 0.7
  signal:
    positive_factors:
      - momentum_20d
      - momentum_60d
    negative_factors:
      - volatility_20d
      - drawdown_20d
    rank_method: percentile
  backtest:
    holding_period: 5
    rebalance_days: 5
    quantile: 0.2
    transaction_cost_bps: 5.0
    spread_cost_bps: 2.0
    market_impact_coefficient: 0.10
    portfolio_notional: 10000000
  validation:
    walk_forward:
      window_count: 3
      min_train_fraction: 0.4
    research_validity:
      enabled: true
      holdout_fraction: 0.15
      fdr_alpha: 0.10
      min_holdout_sharpe: 0.0
      min_holdout_ic: 0.0
      require_positive_return: true
      require_baseline_outperformance: true
      require_walk_forward_stability: true
      require_data_readiness: true
  stress_tests:
    neutralization:
      enabled: true
      group_by: sector
    liquidity:
      enabled: true
      min_dollar_volume_rank: 0.2
  shorting:
    borrow_fee_bps: 75.0
    shortable_symbols:
      - AAPL
      - MSFT
      - NVDA
      - AMZN
      - META
      - GOOGL
      - AVGO
      - COST
      - NFLX
      - AMD
      - ADBE
      - CSCO
      - QCOM
      - TXN
      - INTU
      - AMAT
      - HON
      - SBUX
  robustness:
    bootstrap_iterations: 200
    bootstrap_seed: 123
    holding_periods: [3, 5, 10]
    quantiles: [0.15, 0.2, 0.3]
    cost_multipliers: [0.5, 1.0, 2.0]
  capacity:
    notionals: [1000000, 5000000, 10000000, 25000000]
    max_trade_participation: 0.10
    max_position_weight: 0.35
  baselines:
    - name: momentum_20d_only
      positive_factors:
        - momentum_20d
      negative_factors: []
    - name: low_volatility_only
      positive_factors: []
      negative_factors:
        - volatility_20d
    - name: reversal_5d_only
      positive_factors:
        - reversal_5d
      negative_factors: []
    - name: random_cross_section
      positive_factors: []
      negative_factors: []

report:
  output_path: reports/point_in_time_synthetic_research_report.md
  experiments_path: results/experiments.csv
