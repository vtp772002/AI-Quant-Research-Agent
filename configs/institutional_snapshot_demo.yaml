data:
  source: csv_snapshot
  snapshot:
    path: ../data/golden/institutional_ohlcv_snapshot.csv
    manifest_path: ../data/golden/institutional_ohlcv_snapshot.yaml
    require_manifest_hash: true
  universe_provider:
    kind: csv
    path: institutional_snapshot_membership_demo.csv
  start: "2020-01-01"
  end: "2022-12-31"
  sectors:
    AAA: technology
    BBB: technology
    CCC: consumer
    DDD: consumer
    EEE: industrials
    FFF: industrials
    GGG: healthcare
    HHH: healthcare

experiment:
  name: institutional_snapshot_momentum_low_volatility
  train_fraction: 0.7
  signal:
    positive_factors:
      - momentum_20d
      - momentum_60d
    negative_factors:
      - volatility_20d
      - drawdown_20d
    rank_method: percentile
  backtest:
    holding_period: 5
    rebalance_days: 5
    quantile: 0.25
    transaction_cost_bps: 5.0
    spread_cost_bps: 2.0
    market_impact_coefficient: 0.10
    portfolio_notional: 10000000
  validation:
    walk_forward:
      window_count: 3
      min_train_fraction: 0.4
    research_validity:
      enabled: true
      holdout_fraction: 0.15
      fdr_alpha: 0.10
      min_holdout_sharpe: 0.0
      min_holdout_ic: 0.0
      require_positive_return: true
      require_baseline_outperformance: true
      require_walk_forward_stability: true
      require_data_readiness: true
  stress_tests:
    neutralization:
      enabled: true
      group_by: sector
    liquidity:
      enabled: true
      min_dollar_volume_rank: 0.2
  shorting:
    borrow_fee_bps: 75.0
    locate_history_path: ../data/golden/borrow_availability_demo.csv
    shortable_symbols:
      - AAA
      - BBB
      - CCC
      - DDD
      - EEE
      - FFF
  robustness:
    bootstrap_iterations: 200
    bootstrap_seed: 123
    holding_periods: [3, 5, 10]
    quantiles: [0.2, 0.25]
    cost_multipliers: [0.5, 1.0, 2.0]
  capacity:
    notionals: [1000000, 5000000, 10000000, 25000000]
    max_trade_participation: 0.10
    max_position_weight: 0.35
  baselines:
    - name: momentum_20d_only
      positive_factors:
        - momentum_20d
      negative_factors: []
    - name: low_volatility_only
      positive_factors: []
      negative_factors:
        - volatility_20d
    - name: random_cross_section
      positive_factors: []
      negative_factors: []

report:
  output_path: reports/institutional_snapshot_research_report.md
  experiments_path: results/experiments.csv
